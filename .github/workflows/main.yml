name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Tambahan: Izin akses agar robot bisa menulis/push ke repo
permissions:
  contents: write

env:
  CSV_URL: "MLproject/train_pca.csv"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn

      - name: Run mlflow project
        run: |
          # Karena di modelling.py sudah ada logika SQLite, 
          # kita cukup jalankan mlflow run seperti biasa.
          mlflow run . --env-manager=local 

      - name: Set up Git LFS
        run: |
          git config --global user.name "${{ secrets.username }}"
          git config --global user.email "${{ secrets.email }}"
          git lfs install
          git lfs track "mlruns/**"
          git add .gitattributes
          # Commit .gitattributes agar file besar terkelola LFS
          git commit -m "Track large files in mlruns with Git LFS" || true

      - name: Save mlruns and database to repo
        run: |
          # Tambahkan git pull dengan rebase untuk menghindari konflik merge
          git pull origin main --rebase
          git add -f mlruns/ mlflow.db
          git commit -m "Save mlruns and sqlite db from CI run" || true
          git push origin main
