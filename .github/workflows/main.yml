name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CSV_URL: "MLproject/train_pca.csv"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn

      - name: Run mlflow project
        run: |
          # Perbaikan: Paksa MLflow menggunakan SQLite lokal agar tidak mencari port 5000
          export MLFLOW_TRACKING_URI=sqlite:///mlflow.db
          mlflow run . --env-manager=local 

      - name: Set up Git LFS
        run: |
          git config --global user.name "${{ secrets.username }}"
          git config --global user.email "${{ secrets.email }}"
          git lfs install
          git lfs track "mlruns/**"
          git add .gitattributes
          git commit -m "Track large files in mlruns with Git LFS" || true

      - name: Save mlruns to repo
        run: |
          # Tambahkan git pull agar tidak ada konflik saat push balik
          git pull origin main
          git add -f mlruns/
          git commit -m "Save mlruns from CI run" || true
          git push origin main
